<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>標高計測ツール</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link rel="stylesheet" href="./assets/css/app.css" />
  <link rel="stylesheet" href="./assets/css/elevation-delete.css" />
</head>

<body>
  <div id="map"></div>

  <div id="controls" class="panel">
    <div class="btnrow">
      <button class="btn" id="btnMapToggle" type="button" aria-live="polite">
        <span class="btn__icon btn__icon--map" aria-hidden="true"></span>
        <span class="btn__label">航空写真へ切替</span>
      </button>
      <button class="btn" id="btnExport" type="button">
        <span class="btn__icon btn__icon--export" aria-hidden="true"></span>
        <span class="btn__label">画像出力</span>
      </button>
      <button class="btn" id="btnClear" type="button">
        <span class="btn__icon btn__icon--clear" aria-hidden="true"></span>
        <span class="btn__label">全クリア</span>
      </button>
    </div>
    <div class="hint" id="hintLine">地図をクリックすると標高を取得します</div>
  </div>

  <div id="toast"></div>

  <script src="./assets/js/ui.js"></script>
  <script src="./assets/js/elevation.js"></script>
  <script src="./assets/js/map.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
